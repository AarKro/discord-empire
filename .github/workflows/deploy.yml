# Deploy (tech spec §CI/CD): MANUAL trigger only. SSH to the VPS, pull images,
# run forward-only migrations before app start, then bring services up.
name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/discord-empire
            git pull --ff-only
            # deploy.sh: docker compose pull -> migrate (forward-only) -> up -d
            ./infra/deploy.sh
