id: merchant
token_env: MERCHANT_TOKEN
personas:
  "${GUILD_CONTINENT_ONE}":
    nickname: "Aldric the Trader"
    avatar: aldric.png
    locale_flavor: highlands
  "${GUILD_CONTINENT_TWO}":
    nickname: "Mei Lin"
    avatar: meilin.png
    locale_flavor: harbor
# Registration order = dispatch order; render stays last so it draws the latest
# state. topology (presence gate) and render (bus→Discord surface) are infra.
capabilities:
  - trade
  - topology
  - stall
  - dialogue
  - presence.voice
  - voicelines
  - ambient.chatter
  - render
home:
  "${GUILD_CONTINENT_ONE}": { voice_channel: bazaar_vc }
  "${GUILD_CONTINENT_TWO}": { voice_channel: harbor_vc }
content:
  shop: shops/aldric.yaml
  voicelines: audio/aldric/
  schedule: schedules/aldric.yaml
  workflows:
    - workflows/merchant_wander.yaml
    - workflows/aldric_haggle.yaml
    - workflows/merchant_quest.yaml
    - workflows/secret_merchant.yaml
