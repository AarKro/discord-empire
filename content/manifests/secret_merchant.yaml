# The secret merchant — reference traveling NPC (framework spec §9). A single
# hooded identity present in exactly ONE continent at a time, walking the ring in
# continents.yaml. Its own bot/token so it doesn't collide with the settled
# merchant (who appears as Aldric AND Mei Lin in both continents at once). Same
# face in every guild — a stranger has no home persona.
id: secret_merchant
token_env: SECRET_MERCHANT_TOKEN
personas:
  "${GUILD_CONTINENT_ONE}":
    nickname: "A Hooded Stranger"
    locale_flavor: highlands
  "${GUILD_CONTINENT_TWO}":
    nickname: "A Hooded Stranger"
    locale_flavor: harbor
# No `home` block: a home makes the runner auto-join a voice channel in EVERY
# guild at boot (the settled-presence model). The traveler joins exactly one
# continent, driven by the travel workflow.
capabilities:
  - travel
content:
  continents: continents.yaml
  workflows:
    - workflows/secret_merchant.yaml
