# A sample branching quest (framework spec §7) that showcases the workflow engine's
# per-instance context: the player's early choice is remembered with `set:`, and a
# much later state's options branch on it via a `context.*` guard — without
# duplicating the whole tree per path. Rendered as a private-thread dialogue like
# the haggle; triggered by quest.start (Aldric's "Any work?" option emits it).
id: merchant_quest
scope: player
singleton: true
trigger: { event: quest.start }
initial: intro
states:
  intro:
    prompt: "Aye, a small matter. First, tell me — are you a scholar or a soldier?"
    options:
      - { id: scholar, label: "A scholar", goto: trial }
      - { id: soldier, label: "A soldier", goto: trial }
  trial:
    # Remember the path chosen at intro (the option id that led here) — this value
    # outlives the trial node and gates the reward two states on.
    set: { path: event.payload.option }
    prompt: "Hm. And do you prize fortune, or wisdom?"
    options:
      - { id: fortune, label: "Fortune", goto: verdict }
      - { id: wisdom, label: "Wisdom", goto: verdict }
  verdict:
    prompt: "Then I've just the thing set aside for one like you."
    options:
      - { id: take_scholar, label: "Accept the boon", guard: { expr: "context.path == scholar" }, goto: rewarded_scholar }
      - { id: take_soldier, label: "Accept the boon", guard: { expr: "context.path == soldier" }, goto: rewarded_soldier }
      - { id: decline, label: "Decline, thanks", goto: farewell }
  # Real rewards: a flavour item + reputation (enough to unlock the rep-gated haggle
  # discount), and a prompt that names the remembered path via {{context.path}}.
  rewarded_scholar:
    actions:
      - { "grant.give": { item: trade_charter, qty: 1, reputation: 3 } }
    prompt: "A charter of the old trade routes, for a {{context.path}} — knowledge is the sharper blade. My trust goes with it. Safe travels."
    final: true
  rewarded_soldier:
    actions:
      - { "grant.give": { item: guard_token, qty: 1, reputation: 3 } }
    prompt: "A guardsman's token, for a {{context.path}} — strength opens doors coin can't. You've my trust. Safe travels."
    final: true
  farewell:
    prompt: "No matter. Another time, perhaps."
    final: true
