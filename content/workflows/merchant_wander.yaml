# Merchant wander between two locations (§10). Starts once when the merchant boots
# (bot.ready), then self-loops on its own 30m timers; actions call the
# presence.voice + stall verbs the Merchant registers. A singleton per (workflow,
# scope) keeps a reboot's replayed bot.ready from spawning a duplicate loop.
id: merchant_wander
trigger: { event: bot.ready }
scope: npc
context: { npc: merchant }
initial: at_bazaar
states:
  at_bazaar:
    actions:
      - { "npc.move_to": { channel: bazaar_vc } }
      - { "stall.open": {} }
    timer: { after: 30m, goto: at_square }
  at_square:
    actions:
      - { "stall.close": {} }
      - { "npc.move_to": { channel: market_square_vc } }
      - { "stall.open": {} }
    timer: { after: 30m, goto: at_bazaar }
