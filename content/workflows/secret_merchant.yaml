# The secret merchant (framework spec §7 example, §9 travel) — a hooded stranger
# who genuinely travels BETWEEN continents. Runs on its own bot (manifests/
# secret_merchant.yaml), present in exactly one continent at a time: it lingers in
# a continent's Market Square voice channel, then leaves that guild's voice
# entirely ("on the road") before appearing on a neighbouring continent, walking
# the ring in continents.yaml. Each hop emits a world.rumor the merchant's
# ambient.chatter reacts to.
#
# The ring logic + position live in the `travel` capability; this workflow is just
# the arrive→dwell→depart→transit cadence on timers. World-scoped singleton (one
# stranger abroad, reboot-safe), started once on bot.ready then self-looping.
id: secret_merchant
scope: world
singleton: true
trigger: { event: bot.ready }
initial: arriving
states:
  arriving:
    actions:
      - { travel.enter: { channel: market_square_vc } }
    timer: { after: 45m, goto: departing }
  departing:
    actions:
      - { travel.leave: {} }
    timer: { after: 15m, goto: arriving }
