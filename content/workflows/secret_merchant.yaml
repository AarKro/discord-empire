# The secret merchant (framework spec §7 example) — a rare ambient event authored
# entirely in YAML. On the hour there's a small chance a hooded figure is glimpsed;
# word spreads (world.rumor, which the merchant's ambient.chatter picks up), and
# after a while the trail goes cold. World-scoped + singleton: at most one abroad at
# a time. Rumour rather than a moving NPC — actual movement would need its own
# persona/bot; this exercises the random_chance trigger + timer + emit purely as
# content.
id: secret_merchant
scope: world
singleton: true
trigger: { event: tick.hour, filter: { random_chance: 0.15 } }
initial: appear
states:
  appear:
    actions:
      - { emit: { type: world.rumor, payload: { hint: "A hooded figure was glimpsed at the treeline, gone before anyone could hail them." } } }
    timer: { after: 90m, goto: vanish }
  vanish:
    actions:
      - { emit: { type: world.rumor, payload: { hint: "Whatever the hooded figure sought, they've slipped away — the trail is cold." } } }
    final: true
