# The /build flow as a declarative workflow (§7). One instance per /build, scoped
# to the player; a player may run several at once — each instance is told apart by
# the correlation threaded through its events (§7 correlation routing). Composes
# the land + trade verbs.
id: player_build
trigger: { event: build.requested }
scope: player
initial: charging
states:
  # Stake the plot and charge the cost via `trade`. build.request emits
  # trade.request and records a 'queued' build_queue row (the carry across the
  # async charge); a bad blueprint emits its own reply and throws → on_error routes
  # to rejected_pre. A charge that never settles times out and cleans up.
  charging:
    actions:
      - { "build.request": {} }
    on:
      trade.completed: building
      trade.failed: rejected
    timer: { after: 30s, goto: charge_timeout }
    on_error: rejected_pre
  # Cost settled: promote the queued row to a timed 'building' and announce it.
  building:
    actions:
      - { "build.enqueue": {} }
    on:
      build.completed: done
  # Tick fired build.completed: finish the row and notify the player (once).
  done:
    actions:
      - { "build.complete": {} }
    final: true
  # Charge failed (insufficient funds): discard the pending row, reply in-fiction.
  rejected:
    actions:
      - { "build.reject": { message: "You can't cover the cost of that just yet." } }
    final: true
  # Charge never settled within the window: clean up the pending row. The timer
  # transition carries the instance's player + correlation (synthetic event), so
  # build.reject drops the right row even without a triggering bus event.
  charge_timeout:
    actions:
      - { "build.reject": { message: "…the coin never cleared. Try again in a moment." } }
    final: true
  # Pre-charge rejection already replied inside build.request; nothing to undo.
  rejected_pre:
    final: true
