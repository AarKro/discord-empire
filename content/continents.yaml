# Guild IDs → continent metadata (§9). Two dev continents for iteration 1; a
# three-continent ring is the launch target. Guild IDs come from .env via
# env-placeholder substitution in the content loader (see .env.example).
continents:
  "${GUILD_CONTINENT_ONE}":
    name: "Continent One"
    order: 1
    neighbors: ["${GUILD_CONTINENT_TWO}"]
    resource_bias: highlands
    locale_flavor: highlands
  "${GUILD_CONTINENT_TWO}":
    name: "Continent Two"
    order: 2
    neighbors: ["${GUILD_CONTINENT_ONE}"]
    resource_bias: harbor
    locale_flavor: harbor
